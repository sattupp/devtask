spring.application.name=devtask
# jdbc:h2:file: stores data in a FILE (persists across restarts!)
# ${user.home}/.devtask/data  ?  ~/. devtask/data.mv.db on your machine
# AUTO_SERVER=TRUE  ?  allows multiple processes to access the DB
spring.datasource.url=jdbc:h2:file:${user.home}/.devtask/data;AUTO_SERVER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
# ddl-auto=update  ?  auto-creates/updates the "tasks" table on startup
# Never use "create" in production (wipes data on every restart!)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.main.banner-mode=off
logging.level.root=ERROR
logging.level.org.springframework=ERROR
logging.level.com.devtask=INFO
spring.shell.interactive.enabled=true